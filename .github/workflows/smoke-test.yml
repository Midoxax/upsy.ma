name: Post-publish smoke test

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check key routes return 200
        run: |
          set -e
          BASE_URL="${SMOKE_URL:-https://upsy.lovable.app}"
          ROUTES=("/" "/psychologists" "/services" "/pricing" "/auth" "/founder")
          echo "Smoke-testing $BASE_URL"
          for route in "${ROUTES[@]}"; do
            url="${BASE_URL}${route}"
            code=$(curl -s -o /dev/null -w "%{http_code}" -L "$url")
            if [ "$code" != "200" ]; then
              echo "FAIL $url -> $code"
              exit 1
            fi
            echo "OK   $url -> $code"
          done